bind 0.0.0.0
port 26379
daemonize no
protected-mode no

# Sentinel 접속 비번(유지)
requirepass admin1234!

# ✅ 호스트명 해석/사용 허용
sentinel resolve-hostnames yes

# ✅ 도커 네트워크의 Redis 서비스명을 모니터 (service name: redis)
sentinel monitor mymaster redis 6379 1

# Redis 마스터 인증 비밀번호
sentinel auth-pass mymaster admin1234!

# 개발용 타이밍
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000
sentinel parallel-syncs mymaster 1

# ✅ 클라이언트(호스트)에게 알려줄 주소/포트 (Celery가 호스트에서 붙음)
sentinel announce-ip redis
sentinel announce-port 6379
