name: infra
version: "3.8"

networks:
  network:
    driver: bridge

services:
  mariadb:
    image: mariadb:11.2
    container_name: mariadb-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234!
      MYSQL_DATABASE: mariadb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin1234!
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      # 데이터 볼륨 (영구 저장)
      - ./data:/var/lib/mysql
      # 백업 폴더
      - ./backups:/backups
      # 초기화 스크립트 (옵션)
      - ./init-scripts:/docker-entrypoint-initdb.d
      # 설정 파일 (옵션)
      # - ./config/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-proot1234!",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MariaDB 관리 도구 (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root1234!
      UPLOAD_LIMIT: 100M
    ports:
      - "48082:80"
    networks:
      - network
    depends_on:
      - mariadb
