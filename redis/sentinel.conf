# Redis Sentinel 설정 파일

# Sentinel 포트 설정
port 26379

# Sentinel이 모든 인터페이스에서 연결을 받도록 설정
bind 0.0.0.0

# 보호 모드 비활성화 (Docker 환경에서)
protected-mode no

# Redis 마스터 모니터링 설정
# sentinel monitor <master-name> <ip> <port> <quorum>
# Docker Compose 네트워크에서 서비스명 사용
sentinel monitor mymaster redis-master 6379 2

# 마스터 주소 해석을 위한 설정
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# DNS 해석 시간 제한 (밀리초)
sentinel master-reboot-down-after-period mymaster 0

# 마스터가 다운된 것으로 간주하기까지의 시간 (밀리초)
sentinel down-after-milliseconds mymaster 5000

# 페일오버 타임아웃 (밀리초)
sentinel failover-timeout mymaster 60000

# 동시에 재구성할 수 있는 슬레이브 수
sentinel parallel-syncs mymaster 1

# 로그 설정
loglevel notice
logfile ""

# Sentinel 인증 (마스터에 비밀번호가 있는 경우)
sentinel auth-pass mymaster admin1234!

# 마스터 다운 알림 스크립트 (선택사항)
# sentinel notification-script mymaster /var/redis/notify.sh

# 페일오버 후 클라이언트 재구성 스크립트 (선택사항)
# sentinel client-reconfig-script mymaster /var/redis/reconfig.sh
