apiVersion: v1
kind: Namespace
metadata:
  name: fileserver
---
# ✅ 공통 시크릿 (루트 크리덴셜) — 필요시 값 변경
apiVersion: v1
kind: Secret
metadata:
  name: minio-root-cred
  namespace: fileserver
type: Opaque
stringData:
  MINIO_ROOT_USER: "admin"
  MINIO_ROOT_PASSWORD: "rhrhkdtlr13!" # 길고 복잡하게 바꾸세요
---
# ✅ MinIO 영구스토리지 (NFS SC 사용)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: fileserver
spec:
  accessModes: ["ReadWriteOnce"] # NFS면 RWO/RWX 모두 가능. 필요시 RWX로 변경
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 20Gi
---
# ✅ MinIO (다중 아키텍처 이미지, ARM/AMD 모두 OK)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: fileserver
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-root-cred
          ports:
            - containerPort: 9000 # S3 API
            - containerPort: 9001 # Console
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
# ✅ MinIO Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: fileserver
spec:
  selector: { app: minio }
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# ✅ MinIO 초기 Bucket 생성 Job (root 크리덴셜 사용)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: fileserver
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          envFrom:
            - secretRef:
                name: minio-root-cred
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # MinIO 준비 대기
              until (mc alias set local http://minio.fileserver.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"); do
                echo "waiting for minio..."; sleep 3;
              done
              # files 버킷 생성 (없으면 생성)
              mc mb -p local/files || true
              # public 읽기정책(원하면 주석 해제)
              # mc anonymous set download local/files
              echo "bucket 'files' ready."
---
# ✅ File Browser 전용 스토리지 (간단/독립형) — 업로드/브라우징
#   ※ MinIO와 같은 데이터 공유가 '필수'가 아니라면 이 구성이 가장 안정적/간단합니다.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-data
  namespace: fileserver
spec:
  accessModes: ["ReadWriteMany"] # 여러 파드에서 접근하려면 RWX 권장(NFS면 OK)
  storageClassName: nfs-storage
  resources:
    requests:
      storage: 10Gi
---
# ✅ File Browser Deployment (NodePort로 외부공개)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: fileserver
spec:
  replicas: 1
  selector:
    matchLabels: { app: filebrowser }
  template:
    metadata:
      labels: { app: filebrowser }
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.30.0 # 경량, multi-arch
          args:
            - "--address=0.0.0.0"
            - "--port=8080"
            - "--root=/srv"
          ports:
            - containerPort: 8080
          # 최초 어드민 로그인: admin / admin (로그인 후 Settings→Users에서 비번 변경)
          env:
            - name: FB_BASEURL
              value: "/"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /srv
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: filebrowser-data
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser
  namespace: fileserver
spec:
  selector: { app: filebrowser }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 32180 # ✅ 요청하신 NodePort (필요시 다른 포트로 변경)
  type: NodePort
